name: checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  skills-invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: README skills table in sync
        run: ./scripts/check-readme-skills.sh

      - name: No date metadata in skill frontmatter
        run: ./scripts/check-no-date-metadata.sh
